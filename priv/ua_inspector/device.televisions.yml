  device: 'tv'
  models:
    - regex: '40A35EEVS'
      model: '40A35EEVS'
    - regex: '43A71FEVS'
      model: '43A71FEVS'
    - regex: '50A683FEVS'
      model: '50A683FEVS'

# WELLINGTON
WELLINGTON:
  regex: 'WELLINGTON[;,)]'
  device: 'tv'
  models:
    - regex: '_TV_[A-Z0-9]+_([0-9]{4});'
      model: 'Smart TV ($1)'

# WONDER
WONDER:
  regex: 'WONDER[;,)]'
  device: 'tv'
  models:
    - regex: '_TV_[A-Z0-9]+_([0-9]{4});'
      model: 'Smart TV ($1)'

# X.Vision
X.Vision:
  regex: 'X-VISION[;,)]'
  device: 'tv'
  model: ''

# Vestel
Vestel:
  regex: '(?:Vestel.+VESTEL|(?:BBC_CUSTOMERS|VESTEL)[;,)])'
  device: 'tv'
  models:
    - regex: '_TV_[A-Z0-9]+_([0-9]{4});'
      model: 'Smart TV ($1)'

# Arçelik
Arçelik:
  regex: 'Arcelik'
  device: 'tv'
  model: ''

# XGEM
XGEM:
  regex: 'XGEM[;,)]'
  device: 'tv'
  models:
    - regex: 'XGEM[;,)] ?([a-z0-9]+)(?:[);/ ]|$)'
      model: '$1'

# Xiaomi
Xiaomi:
  regex: 'Amazon.+Xiaomi'
  device: 'tv'
  models:
    - regex: 'AFTANNA0'
      model: 'F2 4K (2022)'
    - regex: 'Amazon.+Xiaomi-([a-z0-9_ -]+)_Build_'
      model: '$1'

# Unknown
Unknown:
  regex: 'OEM, ([a-z0-9_ -]+), (?:wired|wireless)|_TV_[A-Z0-9]+_([0-9]{4});|LaTivu_(?:\d+[.\d]+)_([0-9]{4})|LGE/[^/]+/[^/]+;'
  device: 'tv'
  models:
    - regex: 'LGE/[^/]+/[^/]+; ([a-z0-9-]+);'
      model: '$1'
    - regex: '_TV_[A-Z0-9]+_([0-9]{4});'
      model: 'Smart TV ($1)'
    - regex: 'LaTivu_(?:\d+[.\d]+)_([0-9]{4})'
      model: 'Smart TV ($1)'
