name: NPM CI

on:
  push:
    branches: [master, stable]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Read .tool-versions
      uses: marocchino/tool-versions-action@4219f2e6bfdb4cce482b78f71ad9663e64f4d247 # v2.0.0
      id: versions
    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{steps.versions.outputs.nodejs}}
    - run: npm install --prefix ./assets
    - run: npm install --prefix ./tracker
    - run: npm run generate-types --prefix ./assets && git diff --exit-code -- ./assets/js/types
    - run: npm run typecheck --prefix ./assets
    - run: npm run lint --prefix ./assets
    - run: npm run check-format --prefix ./assets
    - run: npm run test --prefix ./assets
    - run: npm run lint --prefix ./tracker
    - run: npm run check-format --prefix ./tracker
    - run: npm run deploy --prefix ./tracker
