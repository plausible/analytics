services:

  # ── Phoenix application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      MIX_ENV: dev
    ports:
      - "${DEV_APP_PORT:-8000}:8000"
    volumes:
      # Named volumes shadow the bind mount for compiled artifacts.
      # These are populated from the image layers during docker build,
      # ensuring Linux-compiled deps are used rather than the macOS host.
      - deps:/app/deps
      - build:/app/_build
      - assets_node_modules:/app/assets/node_modules
      - tracker_node_modules:/app/tracker/node_modules
      - geodb:/app/priv/geodb
    command: sh -c "mix ecto.create && mix ecto.migrate && mix phx.server"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    stdin_open: true
    tty: true

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DEV_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ClickHouse ───────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest-alpine
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /etc/clickhouse-server/config.d &&
        printf '<clickhouse><listen_host>0.0.0.0</listen_host></clickhouse>' \
          > /etc/clickhouse-server/config.d/listen.xml &&
        exec /entrypoint.sh
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "${DEV_CH_HTTP_PORT:-8123}:8123"
      - "${DEV_CH_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── MinIO (S3-compatible storage) ────────────────────────────────────────
  # Uncomment to develop with S3 features. Also uncomment S3_ENDPOINT in the
  # app environment above and add minio to app depends_on.
