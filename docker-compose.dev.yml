  #   volumes:
  #     - minio_data:/data
  #   ports:
  #     - "${DEV_MINIO_PORT:-10000}:10000"
  #     - "${DEV_MINIO_CONSOLE_PORT:-10001}:10001"
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:10000/minio/health/live"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 10s
  #
