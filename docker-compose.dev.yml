services:

  # ── Phoenix application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      MIX_ENV: dev
    ports:
      - "8000:8000"
    volumes:
      # Bind mount: source code for hot reloading
      - .:/app
      # Mount Docker-specific env file over .env.dev so Envy.load reads service hostnames
      # (postgres/clickhouse) instead of localhost URLs from the host's .env.dev
      - ./config/.env.docker-dev:/app/config/.env.dev:ro
      # Named volumes shadow the bind mount for compiled artifacts.
      # These are populated from the image layers during docker build,
      # ensuring Linux-compiled deps are used rather than the macOS host.
      - deps:/app/deps
      - build:/app/_build
      - assets_node_modules:/app/assets/node_modules
      - tracker_node_modules:/app/tracker/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    stdin_open: true
    tty: true

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ClickHouse ───────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest-alpine
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./.clickhouse_config:/etc/clickhouse-server/config.d
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── MinIO (S3-compatible storage) ────────────────────────────────────────
  # Uncomment to develop with S3 features. Also uncomment S3_ENDPOINT in the
  # app environment above and add minio to app depends_on.
